# Build prebuilt wheels for every OS+CPU and publish to PyPI on a version tag.
#
# Users then `pip install chat4000-pyvodozemac` and get a compiled binary — no
# Rust toolchain on their machine.
#
# Publishing uses PyPI "Trusted Publishing" (OIDC) — no API token stored. ONE-TIME
# PyPI setup (do this once, in the PyPI web UI):
#   PyPI → your account → Publishing → Add a pending publisher:
#     PyPI project name: chat4000-pyvodozemac
#     Owner: chat4000   Repo: chat4000-pyvodozemac
#     Workflow name: release.yml      Environment: (leave blank)
# After that, pushing a tag like `v0.1.0` builds + publishes automatically.
#
# NOTE: the first run will FAIL at compile until the matrix-sdk-crypto `(verify)`
# symbols in src/ are reconciled — that's expected; the CI log is exactly the
# compiler feedback needed to fix them.

name: release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build manylinux wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  musllinux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - name: Build musllinux wheel (Alpine)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: musllinux_1_2
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: dist

  macos:
    runs-on: macos-14
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build macOS wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    # Only on a version tag — branch/PR runs just build (CI feedback), never publish.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, musllinux, macos, sdist]
    environment: pypi
    permissions:
      id-token: write # OIDC for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
