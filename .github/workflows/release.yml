# Build prebuilt wheels for every OS+CPU and attach them to the GitHub Release on
# a version tag. Users install a compiled binary with NO Rust toolchain and NO PyPI:
#
#   pip install chat4000-pyvodozemac \
#     --find-links https://github.com/chat4000/chat4000-pyvodozemac/releases/expanded_assets/v0.1.0
#
# The public repo's Release hosts the wheels; `--find-links` lets pip auto-pick the
# right one per platform. No PyPI account or token needed.
#
# Branch/PR pushes only build (CI feedback). Push a tag `v0.1.0` to build + attach.

name: release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build manylinux wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  musllinux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - name: Build musllinux wheel (Alpine)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: musllinux_1_2
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.target }}
          path: dist

  macos:
    runs-on: macos-14
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build macOS wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: ${{ matrix.target }}
      - name: Build Windows wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Attach wheels to the GitHub Release
    runs-on: ubuntu-latest
    # Only on a version tag — branch/PR runs just build (CI feedback), never release.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, musllinux, macos, sdist, windows]
    permissions:
      contents: write # to create/update the release + upload assets
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      # Attach all built wheels + sdist to the GitHub Release for this tag, so
      # users `pip install chat4000-pyvodozemac --find-links <release assets url>`
      # and get a prebuilt wheel — no Rust, no PyPI. Uses the built-in gh CLI +
      # GITHUB_TOKEN (no third-party action, so org action-policy can't block it).
      - name: Upload wheels to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --notes "Prebuilt wheels. Install with: pip install chat4000-pyvodozemac --find-links https://github.com/${GITHUB_REPOSITORY}/releases/expanded_assets/${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
          || gh release upload "${GITHUB_REF_NAME}" dist/* --clobber --repo "${GITHUB_REPOSITORY}"
